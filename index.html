<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oac-labs | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .oak-gradient { background: linear-gradient(135deg, #1a2e1a 0%, #0a0f0a 100%); }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="oak-gradient text-white min-h-screen flex flex-col items-center justify-center px-6">

    <main class="text-center max-w-2xl">
        <div class="text-6xl mb-6">🌳</div>
        
        <h1 class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tighter">
            oac-labs
        </h1>
        
        <p class="text-xl md:text-2xl text-green-400 font-mono mb-12 h-8">
            Observability as Code Kit <span class="pulse">_</span>
        </p>

        <div class="bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-sm">
            <h2 class="text-2xl font-bold mb-4">Under Construction</h2>
            <p class="text-gray-400 leading-relaxed mb-6">
                We are currently preparing the launch of <strong>oacore</strong>, <strong>oacli</strong>, and <strong>oacorn</strong>. 
                Our mission is to provide a solid, code-centric foundation for modern monitoring.
            </p>
            
            <div class="w-full bg-white/10 rounded-full h-2 mb-2">
                <div class="bg-green-500 h-2 rounded-full" style="width: 35%"></div>
            </div>
            <p class="text-xs text-gray-500 uppercase tracking-widest text-right">Drafting the Core</p>
        </div>

    </main>

    <footer class="absolute bottom-8 w-full text-center px-6">
        <div class="text-gray-600 text-sm mb-4">
            &copy; 2026 oac-labs.com
        </div>
        <div class="flex justify-center space-x-6 text-xs uppercase tracking-widest text-gray-500">
            <a href="https://github.com/oac-labs" class="hover:text-green-400 transition">GitHub</a>
            <span class="text-gray-800">|</span>
            <a href="/legal.html" class="hover:text-green-400 transition">Legal Notice</a>
            <span class="text-gray-800">|</span>
            <a href="/privacy.html" class="hover:text-green-400 transition">Privacy</a>
        </div>
    </footer>

</body>
</html>
